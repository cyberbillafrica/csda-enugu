<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply - CSDA Empowerment Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="text-white text-center py-4 shadow">
    <img src="assets/logo.png" width="100" class="mb-2">
    <h2>CSDA Empowerment Application Form</h2>
</header>

<div class="container py-5">

    <div class="card shadow p-4">

        <form id="applicationForm">

            <h4 class="mb-4">Personal Information</h4>

            <div class="row g-3">

                <div class="col-md-6">
                    <label>Full Name</label>
                    <input class="form-control" type="text" id="full_name" required>
                </div>

                <div class="col-md-3">
                    <label>Age</label>
                    <input class="form-control" type="number" id="age" min="18" max="60" required>
                </div>

                <div class="col-md-3">
                    <label>Gender</label>
                    <select class="form-control" id="gender" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <div class="col-md-6">
    <label for="lga">LGA</label>
    <select class="form-control" id="lga" required>
        <option value="">Select LGA</option>
    </select>
</div>

<div class="col-md-4">
    <label for="ward">Ward</label>
    <select class="form-control" id="ward" required disabled>
        <option value="">Select Ward</option>
    </select>
</div>

  
                <div class="col-md-4">
                    <label>Village</label>
                    <input class="form-control" type="text" id="village" required>
                </div>

                <div class="col-md-4">
                    <label>Community</label>
                    <input class="form-control" type="text" id="community" required>
                </div>

                <div class="col-md-6">
                    <label>State</label>
                    <input class="form-control" type="text" value="Enugu" readonly>
                </div>

                <div class="col-md-6">
                    <label>Phone Number</label>
                    <input class="form-control" type="tel" id="phone" required>
                </div>

                <div class="col-md-6">
                    <label>NIN</label>
                    <input class="form-control" type="text" id="nin" maxlength="11" required>
                </div>

            </div>

            <hr class="my-4">

            <h4 class="mb-4">Bank Details</h4>

            <div class="row g-3">

                <div class="col-md-4">
                    <label>Account Name</label>
                    <input class="form-control" type="text" id="account_name" required>
                </div>

                <div class="col-md-4">
                    <label>Account Number</label>
                    <input class="form-control" type="text" id="account_number" required>
                </div>

                <div class="col-md-4">
                    <label>Bank Name</label>
                    <input class="form-control" type="text" id="bank_name" required>
                </div>

            </div>

            <hr class="my-4">

            <h4 class="mb-4">Skill & Empowerment</h4>

            <div class="row g-3">

                <div class="col-md-6">
                    <label>Skill Type</label>
                    <input class="form-control" type="text" id="skill_type" required>
                </div>

                <div class="col-md-6">
                    <label>Empowerment Choice</label>
                    <select class="form-control" id="empowerment_choice" required>
                        <option value="">Select Option</option>
                        <option>Sewing Machine</option>
                        <option>Hairdressing Machine</option>
                        <option>Grinding Machine</option>
                        <option>Vulcanizing Machine</option>
                        <option>Business Grant</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Upload Skill Evidence</label>
                    <input class="form-control" type="file" id="skill_evidence" accept=".jpg,.jpeg,.png,.pdf" required>
                </div>

                <div class="col-md-6">
                    <label>Upload Passport Photograph</label>
                    <input class="form-control" type="file" id="passport" accept=".jpg,.jpeg,.png" required>
                </div>

            </div>

            <div class="form-check mt-4">
                <input class="form-check-input" type="checkbox" id="declaration" required>
                <label class="form-check-label">
                    I declare that the information provided is true and accurate.
                </label>
            </div>

            <button class="btn btn-success w-100 mt-4 py-3" type="submit">
                Submit Application
            </button>

        </form>

    </div>

</div>

<footer>
    <div class="footer-title">
        Tomorrow is Here
    </div>

    <div class="footer-left">
        <img src="assets/ceo.png" alt="CEO">
    </div>

    <div class="footer-right">
        <img src="assets/governor.png" alt="Governor">
    </div>

    <div class="footer-bottom">
        © CSDA 2026 | Designed by CyberBill Africa
    </div>
</footer>

<script type="module" src="assets/supabase.js"></script>
<script type="module" src="assets/app.js"></script>

    "Udi": ["Abor", "Awhum", "Eke", "Enezike", "Nachis", "Ngwo Asa", "Ngwo Uno", "Nsude", "Oghu", "Udi/Agbudu", "Ukana", "Umuabi", "Umuaga", "Umuneda"],
    "Uzo-Uwani": ["Adani", "Asaba", "Igga/Asaba", "Nimbo", "Nkpologu", "Ogba/Ugwuwaru", "Ogurugu", "Ukpabi/Nimbo", "Umulokpa", "Uvuru"]
};

document.addEventListener("DOMContentLoaded", () => {
    const lgaSelect = document.getElementById("lga");
    const wardSelect = document.getElementById("ward");

    // 1. Populate LGAs Dropdown
    Object.keys(enuguData).sort().forEach(lga => {
        const option = document.createElement("option");
        option.value = lga;
        option.textContent = lga;
        lgaSelect.appendChild(option);
    });

    // 2. Handle Cascading Selection for Wards
    lgaSelect.addEventListener("change", function() {
        const selectedLga = this.value;

        // Reset and clear existing Wards
        wardSelect.innerHTML = '<option value="">Select Ward</option>';
        
        if (selectedLga && enuguData[selectedLga]) {
            // Enable dropdown and populate
            wardSelect.disabled = false;
            enuguData[selectedLga].sort().forEach(ward => {
                const option = document.createElement("option");
                option.value = ward;
                option.textContent = ward;
                wardSelect.appendChild(option);
            });
        } else {
            // Disable if no LGA is selected
            wardSelect.disabled = true;
        }
    });
});
</script>

    
</body>
</html>
