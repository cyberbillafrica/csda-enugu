<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Test Upload + DB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<div class="container">
    <h2>Full Test: Drive + Supabase</h2>
    
    <form id="testForm">
        <div class="mb-3">
            <label>Skill Evidence</label>
            <input type="file" id="skill_evidence" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Passport</label>
            <input type="file" id="passport" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Full Name (for test)</label>
            <input type="text" id="full_name" class="form-control" value="Test User" required>
        </div>
        <div class="mb-3">
            <label>NIN (for test)</label>
            <input type="text" id="nin" class="form-control" value="12345678901" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Run Full Test</button>
    </form>
</div>

<script type="module" src="assets/supabase.js"></script>

<script>
document.getElementById('testForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const submitBtn = this.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.textContent = "Running test...";

    try {
        const skillFile = document.getElementById('skill_evidence').files[0];
        const passportFile = document.getElementById('passport').files[0];

        if (!skillFile || !passportFile) throw new Error("Select both files");

        // 1. Upload to Drive
        console.log("Uploading to Drive...");
        const skillRes = await fetch('https://csda-enugu.vercel.app/api/upload-links', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: `test_skill_${Date.now()}.jpg`, mimeType: skillFile.type })
        });
        const skillData = await skillRes.json();
        const skill_url = skillData.publicUrl;

        const passportRes = await fetch('https://csda-enugu.vercel.app/api/upload-links', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: `test_passport_${Date.now()}.jpg`, mimeType: passportFile.type })
        });
        const passportData = await passportRes.json();
        const passport_url = passportData.publicUrl;

        console.log("Files uploaded. URLs:", skill_url, passport_url);

        // 2. Insert to Supabase
        console.log("Inserting to Supabase...");
        const { error } = await supabase.from('applications').insert([{
            full_name: document.getElementById('full_name').value,
            nin: document.getElementById('nin').value,
            skill_evidence_url: skill_url,
            passport_url: passport_url,
            status: "pending"
        }]);

        if (error) throw error;

        alert("✅ SUCCESS! Both Drive upload and Supabase insert worked.");

    } catch (err) {
        console.error(err);
        alert("❌ Failed: " + err.message);
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Run Full Test";
    }
});
</script>

</body>
</html>
