<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Test Upload + DB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<div class="container">
    <h2>Full Test: Drive + Supabase</h2>
    
    <form id="testForm">
        <div class="mb-3">
            <label>Skill Evidence</label>
            <input type="file" id="skill_evidence" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Passport</label>
            <input type="file" id="passport" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Full Name (for test)</label>
            <input type="text" id="full_name" class="form-control" value="Test User" required>
        </div>
        <div class="mb-3">
            <label>NIN (for test)</label>
            <input type="text" id="nin" class="form-control" value="12345678901" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Run Full Test</button>
    </form>
</div>

<script type="module" src="assets/supabase.js"></script>

<script>
// ====================== RESUMABLE UPLOAD TO GOOGLE DRIVE ======================
async function uploadFileToDrive(file, prefix) {
    const filename = `${prefix}_${Date.now()}_${file.name.replace(/\s+/g, '_')}`;

    // 1. Get resumable upload URL
    const linkRes = await fetch('https://csda-enugu.vercel.app/api/upload-links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            filename, 
            mimeType: file.type 
        }),
    });

    if (!linkRes.ok) throw new Error('Failed to get upload link');

    const { driveUploadUrl } = await linkRes.json();

    // 2. Upload the actual file
    const uploadRes = await fetch(driveUploadUrl, {
        method: 'PUT',
        body: file,
        headers: {
            'Content-Type': file.type,
            'Content-Length': file.size.toString(),
        },
    });

    if (!uploadRes.ok) {
        throw new Error(`Upload failed with status ${uploadRes.status}`);
    }

    return filename; // We can get the link later if needed
}

// ====================== MAIN SUBMISSION ======================
document.getElementById('testForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;

    try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = "Uploading files...";

        const skillFile = document.getElementById('skill_evidence').files[0];
        const passportFile = document.getElementById('passport').files[0];

        if (!skillFile || !passportFile) throw new Error("Both files are required.");

        // Upload files
        const skillFilename = await uploadFileToDrive(skillFile, 'skill');
        const passportFilename = await uploadFileToDrive(passportFile, 'passport');

        // For now, we'll construct the public URL (you can improve this later)
        const skill_evidence_url = `https://drive.google.com/file/d/${skillFilename}/view`; // temporary
        const passport_url = `https://drive.google.com/file/d/${passportFilename}/view`; // temporary

        // Rest of your code (NIN check + DB insert)
        const nin = document.getElementById('nin').value.trim();

        const { data: existing } = await supabase
            .from('applications')
            .select('id')
            .eq('nin', nin)
            .limit(1);

        if (existing && existing.length > 0) {
            throw new Error("Duplicate NIN detected.");
        }

        const formData = {
            full_name: document.getElementById('full_name').value.trim(),
            age: parseInt(document.getElementById('age').value),
            gender: document.getElementById('gender').value,
            lga: document.getElementById('lga').value,
            ward: document.getElementById('ward').value,
            village: document.getElementById('village').value.trim(),
            community: document.getElementById('community').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            nin: nin,
            account_name: document.getElementById('account_name').value.trim(),
            account_number: document.getElementById('account_number').value.trim(),
            bank_name: document.getElementById('bank_name').value.trim(),
            skill_type: document.getElementById('skill_type').value.trim(),
            empowerment_choice: document.getElementById('empowerment_choice').value,
            skill_evidence_url,
            passport_url,
            status: "pending",
            shortlisted: false,
            selected: false,
            rejected: false
        };

        const { error } = await supabase.from('applications').insert([formData]);

        if (error) throw error;

        alert("✅ Application submitted successfully!");
        window.location.href = "success.html";

    } catch (error) {
        console.error(error);
        alert("❌ " + error.message);
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
    }
});
</script>
</body>
</html>
