<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSDA Staff Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<header class="text-white text-center py-4 shadow">
    <img src="../assets/logo.png" width="100" class="mb-2">
    <h2>CSDA Staff Registration</h2>
    <p>Redeem your invite code to activate your account</p>
</header>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card kard shadow p-4">

                <h4 class="mb-4 text-center">Complete Your Registration</h4>

                <form id="registerForm">

                    <div class="mb-3">
                        <label class="form-label">Invite Code <span class="text-danger">*</span></label>
                        <input type="text" id="invite_code" class="form-control" placeholder="Enter invite code (e.g. CSDA-XXXXXX)" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" id="full_name" class="form-control" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address <span class="text-danger">*</span></label>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email address" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                        <input type="tel" id="phone" class="form-control" placeholder="080XXXXXXXX" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
                            <button type="button" id="togglePassword" class="btn btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2">
                        Register & Activate Account
                    </button>

                </form>

                <div class="text-center mt-4">
                    <a href="login.html" class="text-decoration-none">
                        Already registered? Login here
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- FOOTER (Untouched as requested) -->
<footer>
  <!-- Enugu State Seal above the title -->
  <div class="text-center mb-3">
    <img src="../assets/seal.png" alt="Enugu State Seal" style="width:120px; height:120px;">
  </div>

  <!-- Tomorrow is Here title with card-admin applied -->
  <div class="footer-title">TOMORROW IS HERE</div>

  <!-- Images area with CEO and Governor -->
  <div class="footer-images">
    <img src="../assets/ceo.jpg" alt="CEO">
    <div class="footer-center-text">CSDA ENUGU</div>
    <img src="../assets/governor.webp" alt="Governor">
  </div>

  <!-- Copyright -->
  <div class="footer-bottom">
    © CSDA 2026 | Designed by 
    <a href="https://cyberbillafrica.github.io/.com/">CyberBill Africa</a>
  </div>
</footer>

<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>

<!-- Password Toggle -->
<script>
    const toggleBtn = document.getElementById('togglePassword');
    const passwordField = document.getElementById('password');

    toggleBtn.addEventListener('click', () => {
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            toggleBtn.innerHTML = '<i class="bi bi-eye-slash"></i>';
        } else {
            passwordField.type = 'password';
            toggleBtn.innerHTML = '<i class="bi bi-eye"></i>';
        }
    });

    
// ====================== STAFF REGISTRATION HANDLER ======================
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const submitBtn = this.querySelector('button[type="submit"]');
    const originalBtnText = submitBtn.innerHTML;

    try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = `
            <span class="spinner-border spinner-border-sm me-2"></span>
            Registering...
        `;

        const inviteCode = document.getElementById('invite_code').value.trim().toUpperCase();
        const fullName = document.getElementById('full_name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;

        // Validate Invite Code (optional: you can check if it exists first)
        const { data: invite, error: inviteError } = await supabase
            .from('staff_invites')
            .select('*')
            .eq('invite_code', inviteCode)
            .eq('used', false)
            .single();

        if (inviteError || !invite) {
            throw new Error("Invalid or expired invite code.");
        }

        // Create Auth User
        const { data: authData, error: authError } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { full_name: fullName }
            }
        });

        if (authError) throw authError;

        // Insert into staff table
        const { error: staffError } = await supabase
            .from('staff')
            .insert([{
                auth_id: authData.user.id,
                full_name: fullName,
                email: email,
                phone: phone,
                role: invite.role,
                lga: invite.lga,
                ward: invite.ward,
                active: true
            }]);

        if (staffError) throw staffError;

        // Mark invite as used
        await supabase
            .from('staff_invites')
            .update({ used: true })
            .eq('invite_code', inviteCode);

        // SUCCESS
        submitBtn.innerHTML = `✅ Registration Successful!`;
        submitBtn.classList.remove('btn-success');
        submitBtn.classList.add('btn-outline-success');

        alert("🎉 Registration successful!\n\nYou can now login with your email and password.");

        // Auto redirect to login after 2 seconds
        setTimeout(() => {
            window.location.href = "login.html";
        }, 2000);

    } catch (error) {
        console.error(error);
        alert("❌ Registration failed: " + error.message);
        
        // Reset button
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnText;
    }
});

</script>

</body>
</html>
