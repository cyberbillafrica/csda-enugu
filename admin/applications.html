<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Applications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<header class="text-white text-center py-4 shadow">
    <img src="../assets/logo.jpg" width="100" class="mb-2">
    <h2>Manage Applications</h2>
    <p>Screening & Selection Portal</p>
</header>

<div class="container py-5">

    <!-- Filters -->
    <div class="card shadow p-4 mb-4">
        <h4>Search & Filter</h4>

        <div class="row g-3 mt-2">

            <div class="col-md-4">
                <input type="text" id="searchName" class="form-control" placeholder="Search by applicant name">
            </div>

            <div class="col-md-3">
                <input type="text" id="filterWard" class="form-control" placeholder="Filter by ward">
            </div>

            <div class="col-md-3">
                <input type="text" id="filterLGA" class="form-control" placeholder="Filter by LGA">
            </div>

            <div class="col-md-2">
                <button id="applyFilter" class="btn btn-success w-100">
                    Apply Filter
                </button>
            </div>

        </div>
    </div>

    <!-- Applications Table -->
    <div class="card shadow p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Applications List</h4>

            <a href="dashboard.html" class="btn btn-outline-dark">
                Back to Dashboard
            </a>
        </div>

        <div class="table-responsive">

            <table class="table table-bordered table-striped align-middle">

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Ward</th>
                        <th>LGA</th>
                        <th>Skill</th>
                        <th>Choice</th>
                        <th>Files</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="applicationsTable"></tbody>

            </table>

        </div>

    </div>

</div>

<footer>
    <div class="footer-title">
        Tomorrow is Here
    </div>

    <div class="footer-left">
        <img src="../assets/ceo.jpg" alt="CEO">
    </div>

    <div class="footer-right">
        <img src="../assets/governor.webp" alt="Governor">
    </div>

    <div class="footer-bottom">
        © CSDA 2026 | Designed by CyberBill Africa
    </div>
</footer>

<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
