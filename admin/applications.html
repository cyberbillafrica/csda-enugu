<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Applications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<!-- HEADER -->
<header class="text-white text-center py-4 shadow">
  <img src="../assets/logo.png" width="100" class="mb-3 rounded" alt="CSDA Logo">
  <h2>Manage Applications</h2>
  <p>Screening & Selection Portal</p>
</header>

<main class="container py-5">

  <!-- FILTER CARD -->
  <section class="card card-live shadow p-4 mb-4">
    <h4>Search & Filter</h4>
    <div class="row g-3 mt-2">
      <div class="col-md-4">
        <input type="text" id="searchName" class="form-control" placeholder="Search by applicant name">
      </div>
      <div class="col-md-3">
        <input type="text" id="filterWard" class="form-control" placeholder="Filter by ward">
      </div>
      <div class="col-md-3">
        <input type="text" id="filterLGA" class="form-control" placeholder="Filter by LGA">
      </div>
      <div class="col-md-2">
        <button id="applyFilter" class="btn btn-success w-100">Apply Filter</button>
      </div>
    </div>
  </section>

  <!-- TABLE CARD -->
  <section class="card card-admin shadow p-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-3">
      <h4 class="mb-0">Applications List</h4>
      <a href="dashboard.html" class="btn btn-outline-dark">Back to Dashboard</a>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th scope="col">Name</th>
            <th scope="col">Ward</th>
            <th scope="col">LGA</th>
            <th scope="col">Skill</th>
            <th scope="col">Choice</th>
            <th scope="col">Files</th>
            <th scope="col">Status</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody id="applicationsTable"></tbody>
      </table>
    </div>
  </section>

</main>

<!-- FOOTER -->
<footer>
  <!-- Enugu State Seal above the title -->
  <div class="text-center mb-3">
    <img src="../assets/seal.png" alt="Enugu State Seal" style="width:120px; height:120px;">
  </div>

  <!-- Tomorrow is Here title with card-admin applied -->
  <div class="footer-title card-admin">TOMORROW IS HERE</div>

  <!-- Images area with CEO and Governor -->
  <div class="footer-images">
    <img src="../assets/ceo.jpg" alt="CEO">
    <div class="footer-center-text">CSDA ENUGU</div>
    <img src="../assets/governor.webp" alt="Governor">
  </div>

  <!-- Copyright -->
  <div class="footer-bottom">
    © CSDA 2026 | Designed by 
    <a href="https://cyberbillafrica.github.io/.com/">CyberBill Africa</a>
  </div>
</footer>


<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>
</body>
</html>
