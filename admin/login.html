<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSDA Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<header class="text-white text-center py-4 shadow">
    <img src="../assets/logo.jpg" width="100" class="mb-2">
    <h2>CSDA Administrative Portal</h2>
    <p>Government of Enugu State</p>
</header>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow p-4">

                <div class="text-center mb-4">
                    <h3>Admin Login</h3>
                    <p>Authorized personnel only</p>
                </div>

                <form id="loginForm">

                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>

                    <button class="btn btn-success w-100 py-2">
                        Login
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

<footer>
    <div class="footer-title">
        Tomorrow is Here
    </div>

    <div class="footer-left">
        <img src="../assets/ceo.jpg" alt="CEO">
    </div>

    <div class="footer-right">
        <img src="../assets/governor.webp" alt="Governor">
    </div>

    <div class="footer-bottom">
        © CSDA 2026 | Designed by CyberBill Africa
    </div>
</footer>

<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
