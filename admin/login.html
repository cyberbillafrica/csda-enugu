<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSDA Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../assets/style.css">
    <!-- Favicon -->
    <link href="../assets/logo.png" type="image/x-icon" rel="icon">
</head>
<body>

<!-- HEADER -->
<header class="text-white text-center py-4 shadow">
    <img src="../assets/logo.png" width="100" class="mb-3 rounded" alt="CSDA Logo">
    <h2>CSDA Administrative Portal</h2>
    <p>Government of Enugu State</p>
</header>

<!-- LOGIN SECTION -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-staff shadow p-4">
                <div class="text-center mb-4">
                    <h3>Staff Login</h3>
                    <p class="text-danger fw-bold">Authorized Personnel Only</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 py-2" style="background-color: var(--gov-green); border-color: var(--gov-green); color: #fff;">
                        Login
                    </button>
                </form>

                <!-- Additional Links -->
                <div class="text-center mt-4">
                    <p class="mb-1">
                        Don't have an account? 
                        <a href="register.html" class="text-decoration-none">Register here</a>
                    </p>
                  </div>
            </div>
        </div>
    </div>
</div>


<!-- FOOTER -->
<footer>
  <!-- Enugu State Seal above the title -->
  <div class="text-center mb-3">
    <img src="../assets/seal.png" alt="Enugu State Seal" style="width:120px; height:120px;">
  </div>

  <!-- Tomorrow is Here title with card-admin applied -->
  <div class="footer-title">TOMORROW IS HERE</div>

  <!-- Images area with CEO and Governor -->
  <div class="footer-images">
    <img src="../assets/ceo.jpg" alt="CEO">
    <div class="footer-center-text">CSDA ENUGU</div>
    <img src="../assets/governor.webp" alt="Governor">
  </div>

  <!-- Copyright -->
  <div class="footer-bottom">
    © CSDA 2026 | Designed by 
    <a href="https://cyberbillafrica.github.io/.com/">CyberBill Africa</a>
  </div>
</footer>

<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>

<!-- Password Toggle Script -->
<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordField = document.getElementById('password');
        const icon = this.querySelector('i');
        
        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            passwordField.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    });
</script>

</body>
</html>
