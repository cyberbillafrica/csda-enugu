<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSDA Admin Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<!-- HEADER -->
<header class="text-white text-center py-4 shadow">
  <img src="../assets/logo.jpg" width="100" class="mb-3 rounded" alt="CSDA Logo">
  <h2>CSDA Administrative Portal</h2>
  <p>Government of Enugu State</p>
</header>

<!-- LOGIN SECTION -->
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card card-staff shadow p-4">
        <div class="text-center mb-4">
          <h3>Admin Login</h3>
          <p>Authorized personnel only</p>
        </div>
        <form id="loginForm">
          <div class="mb-3">
            <label>Email Address</label>
            <input type="email" id="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input type="password" id="password" class="form-control" required>
          </div>
          <button class="btn btn-success w-100 py-2">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-title">Tomorrow is Here</div>
  <div class="footer-images">
    <img src="../assets/ceo.jpg" alt="CEO">
    <img src="../assets/governor.webp" alt="Governor">
  </div>
  <div class="footer-bottom">
    © CSDA 2026 | Designed by 
    <a href="#" class="text-white fw-bold text-decoration-none">CyberBill Africa</a>
  </div>
</footer>

<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>
</body>
</html>
