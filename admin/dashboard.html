<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSDA Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<header class="text-white text-center py-4 shadow">
    <img src="../assets/logo.jpg" width="100" class="mb-2">
    <h2>CSDA Admin Dashboard</h2>
    <p>Application Management Portal</p>
</header>

<div class="container py-5">

    <!-- Stats Cards -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card shadow p-4 text-center">
                <h6>Total Applications</h6>
                <h2 id="totalApplications">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-4 text-center">
                <h6>Shortlisted</h6>
                <h2 id="shortlistedCount">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-4 text-center">
                <h6>Selected</h6>
                <h2 id="selectedCount">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-4 text-center">
                <h6>Rejected</h6>
                <h2 id="rejectedCount">0</h2>
            </div>
        </div>

    </div>

    <!-- Quick Actions -->
    <div class="card shadow p-4 mt-5">
        <h4>Quick Actions</h4>

        <div class="mt-3 d-flex flex-wrap gap-2">
            <a href="applications.html" class="btn btn-success">
                Manage Applications
            </a>

            <button id="exportCSV" class="btn btn-dark">
                Export CSV
            </button>

            <button id="printShortlisted" class="btn btn-primary">
                Print Shortlisted
            </button>

            <button id="printSelected" class="btn btn-warning">
                Print Selected
            </button>
        </div>
    </div>

    <!-- Ward Analytics -->
    <div class="card shadow p-4 mt-5">
        <h4>Ward Analytics</h4>

        <div class="table-responsive mt-3">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Ward</th>
                        <th>Applications</th>
                        <th>Shortlisted</th>
                        <th>Selected</th>
                    </tr>
                </thead>

                <tbody id="wardAnalytics"></tbody>
            </table>
        </div>
    </div>

</div>

<footer>
    <div class="footer-title">
        Tomorrow is Here
    </div>

    <div class="footer-left">
        <img src="../assets/ceo.jpg" alt="CEO">
    </div>

    <div class="footer-right">
        <img src="../assets/governor.webp" alt="Governor">
    </div>

    <div class="footer-bottom">
        © CSDA 2026 | Designed by CyberBill Africa
    </div>
</footer>

<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
