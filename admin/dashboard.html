<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSDA Dashboard</title>

<meta content="width=device-width, initial-scale=1.0" name="viewport">
<meta name="keywords" content="CSDA Enugu Dashboard, Empowerment Management, Applications, Enugu State">
<meta name="description" content="Access the CSDA Enugu dashboard to manage applications, view eligibility criteria, and track empowerment program progress.">

<meta property="og:title" content="CSDA Enugu Dashboard">
<meta property="og:description" content="Manage applications and track empowerment programs via the CSDA Enugu dashboard.">
<meta property="og:image" content="https://cyberbillafrica.github.io/csda-enugu/assets/logo.png" />
<meta property="og:url" content="https://cyberbillafrica.github.io/csda-enugu/admin/dashboard.html" />
<meta property="og:type" content="website" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="CSDA Enugu Dashboard" />
<meta name="twitter:description" content="Manage applications and track empowerment programs via the CSDA Enugu dashboard." />
<meta name="twitter:image" content="https://cyberbillafrica.github.io/csda-enugu/assets/logo.png" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../assets/style.css">

<!-- Favicon -->
<link href="../assets/logo.png" type="image/x-icon" rel="icon">
</head>
<body>

<header class="text-white text-center py-4 shadow position-relative">
    <img src="../assets/logo.png" width="100" class="mb-2">
    <h2>CSDA Admin Dashboard</h2>
    <p>Application Management Portal</p>

    <!-- Logout Button in Header -->
    <div class="position-absolute top-0 end-0 mt-3 me-4">
        <button onclick="logout()" class="btn btn-danger btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </div>
</header>

<div class="container py-5">

    <!-- Stats Cards -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card card-staff shadow p-4 text-center">
                <h6>Total Applications</h6>
                <h2 id="totalApplications">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-admin shadow p-4 text-center">
                <h6>Shortlisted</h6>
                <h2 id="shortlistedCount">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-live shadow p-4 text-center">
                <h6>Selected</h6>
                <h2 id="selectedCount">0</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-queue shadow p-4 text-center">
                <h6>Rejected</h6>
                <h2 id="rejectedCount">0</h2>
            </div>
        </div>

    </div>

    <!-- Quick Actions -->
    <div class="card card-comments shadow p-4 mt-5">
        <h4>Quick Actions</h4>

        <div class="mt-3 d-flex flex-wrap gap-2">
            <a href="applications.html" class="btn btn-danger flex-fill flex-sm-grow-0">
                Manage Applications
            </a>

            <button id="exportCSV" class="btn btn-dark flex-fill flex-sm-grow-0">
                Export CSV
            </button>

            <button id="printShortlisted" class="btn btn-primary flex-fill flex-sm-grow-0">
                Print Shortlisted
            </button>

            <button id="printSelected" class="btn btn-warning flex-fill flex-sm-grow-0">
                Print Selected
            </button>
        </div>
    </div>

    <!-- Ward Analytics -->
    <div class="card shadow p-4 mt-5">
        <h4>Ward Analytics</h4>

        <div class="table-responsive mt-3">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Ward</th>
                        <th>Applications</th>
                        <th>Shortlisted</th>
                        <th>Selected</th>
                    </tr>
                </thead>
                <tbody id="wardAnalytics"></tbody>
            </table>
        </div>
    </div>

</div>

<!-- FOOTER -->
<footer>
  <!-- Enugu State Seal above the title -->
  <div class="text-center mb-3">
    <img src="../assets/seal.png" alt="Enugu State Seal" style="width:120px; height:120px;">
  </div>

  <!-- Tomorrow is Here title with card-admin applied -->
  <div class="footer-title">TOMORROW IS HERE</div>

  <!-- Images area with CEO and Governor -->
  <div class="footer-images">
    <img src="../assets/ceo.jpg" alt="CEO">
    <div class="footer-center-text">CSDA ENUGU</div>
    <img src="../assets/governor.webp" alt="Governor">
  </div>

  <!-- Copyright -->
  <div class="footer-bottom">
    © CSDA 2026 | Designed by 
    <a href="https://cyberbillafrica.github.io/.com/">CyberBill Africa</a>
  </div>
</footer>

<script type="module" src="../assets/supabase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
